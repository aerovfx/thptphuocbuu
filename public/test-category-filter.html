<!DOCTYPE html>
<html>
<head>
    <title>Test Category Filtering</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(to br, #fef3c7, #fce7f3, #e9d5ff);
        }
        .category-section {
            background: white;
            border: 2px solid #9333ea;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .lab-card {
            background: linear-gradient(to br, #ede9fe, #fce7f3);
            border: 2px solid #c084fc;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .emoji {
            font-size: 32px;
        }
        h2 {
            color: #7c3aed;
        }
        .count {
            background: #fbbf24;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🧪 Category Filtering Test</h1>
    <p>Testing category grouping and filtering logic</p>

    <div id="results"></div>

    <script>
        async function testCategoryFiltering() {
            const response = await fetch('/labs/index.json');
            const data = await response.json();
            
            // Group by category
            const categorized = data.simulations.reduce((acc, sim) => {
                const category = sim.category || 'Other';
                if (!acc[category]) {
                    acc[category] = [];
                }
                acc[category].push(sim);
                return acc;
            }, {});

            const categoryIcons = {
                'Cơ học': '⚡',
                'Quang học': '💡',
                'Computer Vision': '📷',
                'Thị giác máy tính': '👁️',
                'Procedural Generation': '🎲',
                'Machine Learning': '🤖'
            };

            let html = '<h2>📊 Categories Summary</h2>';
            
            Object.keys(categorized).sort().forEach(category => {
                const labs = categorized[category];
                const emoji = categoryIcons[category] || '🔬';
                const totalXP = labs.reduce((sum, lab) => sum + (lab.xp || 0), 0);
                
                html += `
                    <div class="category-section">
                        <h2>
                            <span class="emoji">${emoji}</span> 
                            ${category}
                            <span class="count">${labs.length} labs</span>
                            <span class="count" style="background: #10b981">${totalXP} XP</span>
                        </h2>
                        <p>URL: <code>/dashboard/labtwin/labs?category=${encodeURIComponent(category)}</code></p>
                        
                        ${labs.map(lab => `
                            <div class="lab-card">
                                <strong>${lab.name}</strong><br>
                                <small>${lab.description.substring(0, 100)}...</small><br>
                                <span>📚 ${lab.level}</span> |
                                <span>⏱️ ${lab.duration}</span> |
                                <span>⭐ +${lab.xp} XP</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            });

            document.getElementById('results').innerHTML = html;
        }

        testCategoryFiltering();
    </script>
</body>
</html>
