steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/thptphuocbuu360:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/thptphuocbuu360:latest'
      - '.'
    timeout: '1200s'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/thptphuocbuu360'
    timeout: '600s'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-service'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'thptphuocbuu360'
      - '--image'
      - 'gcr.io/$PROJECT_ID/thptphuocbuu360:$BUILD_ID'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXTAUTH_URL=https://thptphuocbuu.edu.vn,GCP_PROJECT_ID=in360project,GCS_BUCKET_NAME=thptphuocbuu360'
      - '--update-secrets'
      - 'NEXTAUTH_SECRET=nextauth-secret:latest,DATABASE_URL=database-url:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest'
    timeout: '600s'

images:
  - 'gcr.io/$PROJECT_ID/thptphuocbuu360:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/thptphuocbuu360:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

